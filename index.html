<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="body-wrapper">
      <div class="logo-wrapper">
        <div class="image-container">
          <img src="odin-lined.png" alt="odin-logo" class="logo" />
          <span>ODIN</span>
        </div>
        <div class="footer-wrapper">
          <footer>
            photo by <span class="credits">Halie west</span> on
            <span class="credits">Unsplash</span>
          </footer>
        </div>
      </div>
      <div class="main">
        <div class="disclaimer">
            <div class="warning">
          <p>
            This is not a real online service! You know you need something like
            this in your life to help you realize your deepest dreams.
          </p>
          <p>sign up now to get started.</p>
          <p>You know you want to.</p>
          </div>
          <form action="#">
            <div class="form-container">
            <fieldset>
            
              <legend>Let's do this!</legend>
              <div class="input-fileds">
                    <label for="first-name"
                >FIRST NAME
                <input type="text" name="firstName" id="first-name" />
              </label>
              <label for="last-name"
                >LAST NAME
                <input type="text" name="lastName" id="last-name" />
              </label>
              <label for="email"
                >EMAIL
                <input type="email" name="email" id="email" />
              </label>
              <label for="phoneNumber"
                >PHONE NUMBER
                <input type="tel" id="phoneNumber" name="phoneNumber" />
              </label>
              <label for="password"
                >PASSWORD
                <input type="password" id="password" name="password" minlength="8" maxlength="20"/>
              </label>
              <label for="confirmPassword"
                >CONFIRM PASSWORD
                <input
                  type="password"
                  name="confirmPassword"
                  id="confirmPassword"
                  minlength="8" maxlength="20"
                 />
              </label>
              </div>
              
            </fieldset>
            </div>
            <button>Create Account</button>
          </form>
          <p>Already have an account? <a href="#">Log in</a></p>
        </div>
      </div>
    </div>
  </body>
</html>
